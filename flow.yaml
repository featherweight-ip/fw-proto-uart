# yaml-language-server: $schema=https://dv-flow.github.io/flow.dv.schema.json
package:
  name: fw.proto.uart

  # The kit sources live in src/; a runnable back-to-back demonstrator (the REQUIRED
  # §16 sim test) lives in tests/; a back-to-back formal proof of the cores lives in
  # tests/formal/. The class layer is self-contained SV (interface-classes + plain
  # bridges), so the kit imports no external modeling library.
  fragments:
  - src/flow.yaml
  - tests/flow.yaml
  - tests/formal/flow.yaml
